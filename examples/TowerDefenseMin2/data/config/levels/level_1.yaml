    fillColor: [35, 28, 22]

blockedZones:
  - type: circle
    cx: 600
    cy: 300
    radius: 55
    visual: asteroid

  - type: circle
    cx: 900
    cy: 400
    radius: 40
    visual: asteroid

allowedTowers:
