platforms:
  # P_base: 基地附近主平台（青色边缘，核心防御区，不规则六边形）
  - points:
      - { x: 560, y: 540 }
      - { x: 760, y: 520 }
      - { x: 820, y: 680 }
      - { x: 680, y: 780 }
      - { x: 520, y: 720 }
      - { x: 480, y: 620 }
    edgeColor: [0, 200, 170]
    fillColor: [20, 35, 40]


  # P_left: 路径中上段右侧不规则小平台（红框区域，不与路径接壤）
  - points:
      - { x: 380, y: 140 }
      - { x: 520, y: 120 }
      - { x: 580, y: 220 }
      - { x: 480, y: 300 }
      - { x: 340, y: 260 }
    edgeColor: [100, 110, 130]
    fillColor: [26, 28, 36]

  # P_right: 路径右段附近不规则小平台（右上方，不与路径接壤）
  - points:
      - { x: 960, y: 420 }
      - { x: 1160, y: 440 }
      - { x: 1260, y: 560 }
      - { x: 1120, y: 640 }
      - { x: 920, y: 540 }
    edgeColor: [100, 110, 130]
    fillColor: [26, 28, 36]

  # P_exit: 出口附近不规则平台（右下，橙色边缘）
  - points:
      - { x: 1220, y: 740 }
      - { x: 1400, y: 720 }
      - { x: 1440, y: 820 }
      - { x: 1280, y: 835 }
      - { x: 1180, y: 800 }
