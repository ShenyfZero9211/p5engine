towers:
  mg:
    nameKey: tower.mg.name
    descKey: tower.mg.desc
    cost: 80
    range: 125
    firePeriod: 0.15
    damage: 5
    aoeRadius: 0
    laserBonus: 0
    slowFactor: 0
    buildTime: 2.0
    iconColor: [74, 158, 255]
    upgrade:
      cost: 30              # 升级花费（金币），默认约为造价的一半
      buildTime: 2.0        # 升级所需时间（秒）
      damageMult: 1.3       # 升级后伤害倍率
      bulletSizeMult: 1.3   # 升级后子弹/弹道渲染尺寸倍率
    upgrade2:               # 伤害翻倍，双发连射
      cost: 50
      buildTime: 2.0
    sfx:
      fire: sounds/synthetic-spike.wav
      place: sounds/keytyping4.wav
      complete: sounds/percussive-bongo-hi.wav

  piercer:
    # 破甲者 — 超高单体伤害，可穿透护甲，狙击精英怪
    nameKey: tower.piercer.name
    descKey: tower.piercer.desc
    cost: 350
    range: 300
    firePeriod: 5.0
    damage: 200
    aoeRadius: 0
    laserBonus: 0
    slowFactor: 0
    buildTime: 2.5
    iconColor: [180, 30, 60]
    missileSpeed: 600              # 火球飞行速度（像素/秒）
    upgrade:
      cost: 120
      buildTime: 2.5
      damageMult: 1.4
    upgrade2:
      cost: 180
      buildTime: 2.5
    sfx:
      fire: sounds/synthetic-spike.wav
      place: sounds/keytyping4.wav
      complete: sounds/percussive-bongo-hi.wav

  missile:
    # 导弹塔 — 发射导弹，命中后造成范围爆炸伤害
    nameKey: tower.missile.name
    descKey: tower.missile.desc
    cost: 200                       # 建造花费（金币）
    range: 280                      # 攻击射程（像素）
    firePeriod: 1.5                 # 发射冷却间隔（秒）
    damage: 25                      # 基础伤害
    aoeRadius: 80                   # 爆炸伤害半径（像素）
    laserBonus: 0                   # 激光额外伤害（导弹塔不使用）
    slowFactor: 0                   # 减速系数（导弹塔不使用）
    buildTime: 3.5                  # 建造所需时间（秒）
    iconColor: [255, 100, 60]       # 图标/塔身颜色（RGB）
    upgrade:
      cost: 100                     # 升级花费（金币）
      buildTime: 3.5                # 升级所需时间（秒）
      damageMult: 1.2               # 升级后伤害倍率
      aoeMult: 1.2                  # 升级后范围伤害半径倍率
      bulletSizeMult: 1.3           # 升级后子弹/爆炸渲染尺寸倍率
    upgrade2:                       # 伤害再+20%，附加燃烧
      cost: 60
      buildTime: 2.0
    burnDamage: 5                   # 燃烧每秒伤害（2级附加）
    burnDuration: 3.0               # 燃烧持续时间（秒）
    sfx:
      fire: sounds/synthetic-bass.wav
      place: sounds/keytyping4.wav
      complete: sounds/percussive-bongo-lo.wav

  laser:
    # 激光塔 — 发射高能粒子束，对单体目标造成持续灼烧伤害
    nameKey: tower.laser.name
    descKey: tower.laser.desc
    cost: 200                       # 建造花费（金币）
    range: 200                      # 攻击射程（像素）
    firePeriod: 2.5                 # 发射冷却间隔（秒）
    damage: 60                     # 基础伤害
    aoeRadius: 0                    # 爆炸/范围伤害半径（激光塔不使用）
    laserBonus: 3.0                 # 激光额外持续伤害
    slowFactor: 0                   # 减速系数（激光塔不使用）
    buildTime: 2.7                  # 建造所需时间（秒）
    iconColor: [200, 120, 220]      # 图标/塔身颜色（RGB）
    upgrade:
      cost: 80                      # 升级花费（金币）
      buildTime: 2.7                # 升级所需时间（秒）
      speedMult: 0.7                # 升级后冷却时间倍率，越小攻速越快
    upgrade2:                       # 伤害 +60%
      cost: 80
      buildTime: 2.7
    laserDelay: 0.2                 # 激光延迟命中时间（秒），用于瞄准动画
    sfx:
      fire: sounds/synthetic-rave.wav
      place: sounds/keytyping4.wav
      complete: sounds/resonant-flute.wav

  slow:
    # 减速塔 — 发射谐波干扰波，降低范围内敌人移速
    nameKey: tower.slow.name
    descKey: tower.slow.desc
    cost: 400                       # 建造花费（金币）
    range: 150                      # 作用射程（像素）
    firePeriod: 4.0                 # 发射冷却间隔（秒）
    damage: 0                       # 即时伤害（减速塔无伤害）
    aoeRadius: 100                  # 减速作用半径（像素）
    laserBonus: 0                   # 激光额外伤害（减速塔不使用）
    slowFactor: 0.5                 # 减速系数（目标速度 ×0.5）
    slowDuration: 2.0               # 减速持续时间（秒）
    buildTime: 4.0                  # 建造所需时间（秒）
    iconColor: [60, 220, 120]       # 图标/塔身颜色（RGB）
    upgrade:
      cost: 160                     # 升级花费（金币）
      buildTime: 4.0                # 升级所需时间（秒）
      rangeMult: 1.2                # 升级后射程/范围倍率
      slowMult: 0.8                 # 升级后减速系数倍率，越小减速越强
    upgrade2:                       # 减速持续时间 +50%
      cost: 160
      buildTime: 4.0
    sfx:
      fire: sounds/ambient-swoosh.wav
      place: sounds/keytyping4.wav
      complete: sounds/ambient-glass.wav

  poison:
    # 毒素塔 — 扇形毒雾喷射，持续伤害（DoT）
    nameKey: tower.poison.name      # 显示名称的国际化键
    descKey: tower.poison.desc      # 描述文本的国际化键
    cost: 300                       # 建造花费（金币）
    range: 100                      # 攻击射程（像素）
    firePeriod: 2.25                # 喷射冷却间隔（秒）
    damage: 0                       # 即时伤害（毒塔为0，伤害来自DoT）
    aoeRadius: 0                    # 爆炸/范围即时伤害半径（毒塔不使用）
    laserBonus: 0                   # 激光额外伤害（毒塔不使用）
    slowFactor: 0                   # 减速系数（毒塔不使用）
    buildTime: 3.0                  # 建造所需时间（秒）
    iconColor: [68, 204, 68]        # 图标/塔身颜色（RGB）
    upgrade:
      cost: 120                     # 升级花费（金币）
      buildTime: 3.0                # 升级所需时间（秒）
      poisonMult: 1.3               # 升级后毒素伤害倍率
    upgrade2:                       # 毒素再+30%，喷射角度 +50%
      cost: 120
      buildTime: 3.0
    poisonDamage: 5                 # 毒素每秒伤害（DPS）
    poisonDuration: 4.0             # 毒素持续时间（秒），可叠加
    poisonFanAngle: 90              # 扇形喷射角度（度），例如 90=直角，120=更宽，60=更窄
    sfx:
      fire: sounds/ambient-swoosh.wav   # 喷射音效
      place: sounds/keytyping4.wav      # 放置音效
      complete: sounds/ambient-glass.wav # 建造完成音效

  command:
    # 指挥塔 — 被动光环：范围内其他塔攻击力加成 + 击杀奖金
    nameKey: tower.command.name
    descKey: tower.command.desc
    cost: 400                       # 建造花费（金币）
    range: 125                      # 光环作用射程（像素）
    firePeriod: 6.0                 # 发射冷却间隔（秒，指挥塔不攻击）
    damage: 0                       # 即时伤害（指挥塔无伤害）
    aoeRadius: 0                    # 爆炸/范围伤害半径（指挥塔不使用）
    laserBonus: 0                   # 激光额外伤害（指挥塔不使用）
    slowFactor: 0                   # 减速系数（指挥塔不使用）
    buildTime: 4.0                  # 建造所需时间（秒）
    iconColor: [255, 215, 0]        # 图标/塔身颜色（RGB）
    commandBonus: 1.1               # 0 级攻击力加成倍率
    killBonusMin: 0                 # 0 级击杀奖金最小值（0=无奖金）
    killBonusMax: 0                 # 0 级击杀奖金最大值
    upgrade:
      cost: 120                     # 升级花费（金币）
      buildTime: 4.0                # 升级所需时间（秒）
      commandMult: 1.2              # 1 级攻击力加成倍率
      killBonusMin: 1               # 1 级击杀奖金最小值
      killBonusMax: 2               # 1 级击杀奖金最大值
    upgrade2:
      cost: 120                     # 升级花费（金币）
      buildTime: 4.0                # 升级所需时间（秒）
      commandMult: 1.3              # 2 级攻击力加成倍率
      killBonusMin: 1               # 2 级击杀奖金最小值
      killBonusMax: 3               # 2 级击杀奖金最大值
    sfx:
      fire: sounds/ambient-swoosh.wav
      place: sounds/keytyping4.wav
      complete: sounds/ambient-glass.wav

  tesla:
    # 特斯拉塔 — 连锁闪电，对密集敌群效率极高
    nameKey: tower.tesla.name
    descKey: tower.tesla.desc
    cost: 120                       # 建造花费（金币）
    range: 160                      # 攻击射程（像素）
    firePeriod: 2.5                 # 发射冷却间隔（秒）
    damage: 25                      # 基础伤害
    aoeRadius: 0                    # 爆炸/范围即时伤害半径（不使用）
    laserBonus: 0                   # 激光额外伤害（不使用）
    slowFactor: 0                   # 减速系数（不使用）
    buildTime: 2.0                  # 建造所需时间（秒）
    iconColor: [0, 229, 255]        # 图标/塔身颜色（电青色 RGB）
    chainCount: 3                   # 基础弹射次数
    chainRange: 80                 # 弹射索敌范围（像素）
    chainDecay: 0.2                 # 基础伤害衰减比例（20%）
    upgrade:
      cost: 50                      # 升级花费（金币）
      buildTime: 2.0                # 升级所需时间（秒）
      chainCount: 5                 # 1 级弹射次数
      chainDecay: 0.15              # 1 级衰减比例（15%）
    upgrade2:
      cost: 80                      # 升级花费（金币）
      buildTime: 2.0                # 升级所需时间（秒）
      chainCount: 7                 # 2 级弹射次数
      chainDecay: 0.12              # 2 级衰减比例（12%）
    sfx:
      fire: sounds/synthetic-spike.wav
      place: sounds/keytyping4.wav
      complete: sounds/percussive-bongo-hi.wav
