# 贴图集配置
# 按 textureSets -> {setName} -> default / entries 组织
# default: 该 set 下所有贴图的默认值
# entries: 单张贴图覆盖，不写则继承 default

textureSets:
  ruins:
    default:
      scaleMode: fit      # fit=等比例适应区域, fill=等比例填充(可能裁切), stretch=拉伸到区域
      scale: 1.0          # 在 scaleMode 结果上再乘的系数 (1.0=占满, 0.9=留边距, 1.2=超出区域)
      anchor: center      # center=居中, topleft=贴左上角
      globalScale: 0.5    # 全局额外缩放：在 scale 之后再乘一遍，用于统一调整 ruins 整体大小

    entries:
      ruins_0.png:
        scaleMode: fit
        scale: 1.00
