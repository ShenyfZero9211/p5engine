# 游戏全局经济设置
gameSettings:
  # DEFEND_BASE 模式下基地每秒自动产钱
  # SURVIVAL 模式下此值无效
  baseIncomeRate: 0.50
  # 指挥塔击杀 tier-2+ 敌人的额外奖金随机范围
  commandKillBonusMin: 1
  commandKillBonusMax: 3
  # 建塔按钮 Tooltip 悬停延迟（秒）
  tooltipDelay: 0.8
  # 星星背景整体亮度 (0.0 = 完全黑暗, 1.0 = 正常亮度)
  starBrightness: 0.6
  # 菜单背景星星/网格整体亮度 (0.0 = 完全黑暗, 1.0 = 正常亮度)
  menuStarBrightness: 1.0
  # 主菜单背景颜色 (RGB, 0~255)
  menuBgR: 8
  menuBgG: 12
  menuBgB: 28
  # 背景 LOD 触发阈值：当 camera zoom <= 该值时启用降级渲染 (0.0 = 永久关闭 LOD)
  bgLodZoomThreshold: 1.7
  # 背景星星/星云是否每次随机生成 (true = 每次随机, false = 按关卡 ID 固定)
  randomBackground: true
  # 是否渲染 blockedZones 视觉元素 (true = 渲染, false = 隐藏)
  renderBlockedZones: true
  # 是否渲染背景星星 (true = 渲染, false = 隐藏)
  renderStars: true
  # 是否渲染星云 (true = 渲染, false = 隐藏)
  renderNebulas: true
  # 是否渲染平台层 (Layer 3: 平台地形 + 该层 blockedZones)
  renderPlatformLayer: true
  # 片头动画开始前的黑屏延迟（秒）
  introDelay: 2.0
  # 片头动画结束后的黑屏延迟（秒）
  introPostDelay: 1.0
  # 是否启用新手引导（true = 启用，按存档记录判断是否触发；false = 完全禁用）
  enableTutorial: true
  # 调试：强制永远显示引导（true = 忽略存档记录，每次进入都触发；false = 正常按存档判断）
  debugTutorialAlwaysOn: true
  # 字体预加载大小（createFont 的 size 参数，调大可改善高分辨率下文字清晰度）
  fontSizeSmall: 32
  fontSizeLarge: 128
  # 任务简报字体大小
  fontSizeBriefing: 14

# 游戏难度参数
difficulties:
  easy:
    nameKey: "difficulty.easy"
    enemyHpMultiplier: 0.8
    killRewardMultiplier: 1.2
    startingMoneyMultiplier: 1.0
  normal:
    nameKey: "difficulty.normal"
    enemyHpMultiplier: 1.0
    killRewardMultiplier: 1.0
    startingMoneyMultiplier: 1.0
  hard:
    nameKey: "difficulty.hard"
    enemyHpMultiplier: 1.1
    killRewardMultiplier: 1.0
    startingMoneyMultiplier: 0.9
  challenge:
    nameKey: "difficulty.challenge"
    enemyHpMultiplier: 1.2
    killRewardMultiplier: 0.9
    startingMoneyMultiplier: 0.85
