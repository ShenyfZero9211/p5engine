- id: 5
  nameKey: level.5.name
  subtitleKey: level.5.subtitle
  levelType: SURVIVAL
  initialMoney: 9999999
  maxEscapeCount: 50
  enemyHpBase: 80
  worldWidth: 1600
  worldHeight: 900
  basePos: { x: 800, y: 450 }
  exitPos: { x: 1550, y: 450 }
  spawnPos: { x: 50, y: 450 }
  pathPoints:
    - { x: 50, y: 450 }
    - { x: 400, y: 450 }
    - { x: 400, y: 150 }
    - { x: 800, y: 150 }
    - { x: 800, y: 750 }
    - { x: 1200, y: 750 }
    - { x: 1200, y: 450 }
    - { x: 1550, y: 450 }
  waves:
    # Wave 1: slow basic enemies
    - delay: 1.0
      spawns:
        - type: level1
          count: 5
          interval: 2.0
    # Wave 2: fast swarm
    - delay: 2.0
      spawns:
        - type: level2
          count: 10
          interval: 1.5
    # Wave 3: slow medium
    - delay: 2.0
      spawns:
        - type: level3
          count: 5
          interval: 1.5
    # Wave 4: fast medium
    - delay: 2.0
      spawns:
        - type: level4
          count: 5
          interval: 1.2
    # Wave 5: speedsters
    - delay: 2.0
      spawns:
        - type: level1
          count: 10
          interval: 1.2
    # Wave 6: bosses
    - delay: 2.0
      spawns:
        - type: level2
          count: 2
          interval: 1.2
    # Wave 7: mixed rhythm
    - delay: 3.0
      spawns:
        - type: level1
          count: 8
          interval: 1.2
        - type: level2
          count: 3
          interval: 1.0
        - type: level4
          count: 1
          interval: 4.0
    # Wave 8: all types
    - delay: 3.0
      spawns:
        - type: level1
          count: 6
          interval: 1.0
        - type: level2
          count: 3
          interval: 1.0
        - type: level3
          count: 2
          interval: 1.2
        - type: level4
          count: 2
          interval: 4.0
