- id: 3
  nameKey: level.3.name
  subtitleKey: level.3.subtitle
  levelType: DEFEND_BASE
  initialMoney: 400
  baseOrbs: 60
  enemyHpBase: 130
  worldWidth: 2000
  worldHeight: 1600
  basePos: { x: 1000, y: 800 }
  exitPos: { x: 1800, y: 1400 }
  spawnPos: { x: 200, y: 200 }
  paths:
    - id: north_in
      type: INBOUND
      points:
        - { x: 200, y: 200 }
        - { x: 600, y: 200 }
        - { x: 1000, y: 800 }
    - id: south_in
      type: INBOUND
      points:
        - { x: 200, y: 1400 }
        - { x: 600, y: 1400 }
        - { x: 1000, y: 800 }
    - id: east_out
      type: OUTBOUND
      points:
        - { x: 1000, y: 800 }
        - { x: 1400, y: 400 }
        - { x: 1800, y: 400 }
    - id: southeast_out
      type: OUTBOUND
      points:
        - { x: 1000, y: 800 }
        - { x: 1400, y: 1200 }
        - { x: 1800, y: 1400 }
  waves:
    - delay: 2.0
      spawns:
        - type: level1
          count: 4
          interval: 0.6
          route: north_in
        - type: level1
          count: 4
          interval: 0.6
          route: south_in
    - delay: 4.0
      spawns:
        - type: level1
          count: 6
          interval: 0.5
          route: north_in
        - type: level2
          count: 2
          interval: 1.2
          route: south_in
    - delay: 4.0
      spawns:
        - type: level2
          count: 4
          interval: 0.6
          route: north_in
        - type: level2
          count: 3
          interval: 0.8
          route: south_in
    - delay: 5.0
      spawns:
        - type: level2
          count: 5
          interval: 0.5
          route: south_in
        - type: level3
          count: 2
          interval: 1.0
          route: north_in
    - delay: 5.0
      spawns:
        - type: level3
          count: 4
          interval: 0.6
          route: north_in
        - type: level3
          count: 3
          interval: 0.8
          route: south_in
        - type: level4
          count: 1
          interval: 2.0
          route: north_in
    - delay: 6.0
      spawns:
        - type: level3
          count: 5
          interval: 0.5
          route: south_in
        - type: level4
          count: 2
          interval: 1.5
          route: north_in
    - delay: 6.0
      spawns:
        - type: level4
          count: 4
          interval: 0.8
          route: north_in
        - type: level4
          count: 3
          interval: 1.0
          route: south_in

